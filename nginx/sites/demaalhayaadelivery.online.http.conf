# demaalhayaadelivery.online — HTTP فقط (حتى يُصدَر certbot شهادة SSL)

upstream delivery_app {
    server 127.0.0.1:3000;
    keepalive 8;
}

upstream price_api {
    server 127.0.0.1:5000;
    keepalive 4;
}

upstream price_admin {
    server 127.0.0.1:5001;
    keepalive 4;
}

upstream price_client {
    server 127.0.0.1:5002;
    keepalive 4;
}

server {
    listen 80;
    listen [::]:80;
    server_name demaalhayaadelivery.online www.demaalhayaadelivery.online;

    client_max_body_size 30m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location ^~ /price-api/ {
        proxy_pass http://price_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /price-admin {
        return 301 /price-admin/;
    }

    location ^~ /price-admin/ {
        proxy_pass http://price_admin/price-admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /price {
        return 301 /price/;
    }

    location ^~ /price/ {
        proxy_pass http://price_client/price/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://delivery_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
    }
}
