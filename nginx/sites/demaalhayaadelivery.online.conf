# demaalhayaadelivery.online — التوصيل + تطبيق الأسعار (/price/)
# يُنسخ إلى: /etc/nginx/sites-available/demaalhayaadelivery.online

upstream delivery_app {
    server 127.0.0.1:3000;
    keepalive 8;
}

upstream price_api {
    server 127.0.0.1:5000;
    keepalive 4;
}

upstream price_admin {
    server 127.0.0.1:5001;
    keepalive 4;
}

upstream price_client {
    server 127.0.0.1:5002;
    keepalive 4;
}

server {
    listen 80;
    listen [::]:80;
    server_name demaalhayaadelivery.online www.demaalhayaadelivery.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name demaalhayaadelivery.online www.demaalhayaadelivery.online;

    ssl_certificate     /etc/letsencrypt/live/demaalhayaadelivery.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demaalhayaadelivery.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 30m;

    # ─── تطبيق الأسعار (price_app) — قبل location / ───
    location ^~ /price-api/ {
        proxy_pass http://price_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /price-admin {
        return 301 /price-admin/;
    }

    location ^~ /price-admin/ {
        proxy_pass http://price_admin/price-admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /price {
        return 301 /price/;
    }

    location ^~ /price/ {
        proxy_pass http://price_client/price/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── نظام التوصيل ───
    location / {
        proxy_pass http://delivery_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
    }
}
