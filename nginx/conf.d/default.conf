# شركة ديما الحياة - التوجيه الرئيسي
# عدّل DOMAIN في .env (مثال: demaalhayaadelivery.online)

# HTTP — تحويل للـ HTTPS
server {
    listen 80;
    server_name _;
    
    # للتحقق من Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }
    
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — التطبيق
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # /driver -> تطبيق السائقين
    location = /driver {
        return 308 /driver/;
    }
    location /driver/ {
        proxy_pass http://driver-web:3001/;
    }

    # /employee -> تطبيق الموظفين
    location = /employee {
        return 308 /employee/;
    }
    location /employee/ {
        proxy_pass http://employee-web:3002/;
    }

    # الرئيسي -> التطبيق
    location / {
        proxy_pass http://app:3000;
    }
}
