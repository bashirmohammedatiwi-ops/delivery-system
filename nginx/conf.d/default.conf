# شركة ديما الحياة - التوجيه الرئيسي
# عدّل DOMAIN في .env (مثال: demaalhayaadelivery.online)
# DNS الداخلي لـ Docker لحل أسماء الحاويات
resolver 127.0.0.11 valid=10s ipv6=off;

# HTTP — تحويل للـ HTTPS
server {
    listen 80;
    server_name _;
    
    # للتحقق من Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }
    
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — التطبيق
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # /driver -> تطبيق السائقين (ملفات CSS/JS من nginx مباشرة)
    location = /driver {
        return 308 /driver/;
    }
    location /driver/ {
        root /var/www;
        try_files $uri $uri/ @driver_proxy;
    }
    location @driver_proxy {
        set $upstream_driver delivery-driver-web:3001;
        proxy_pass http://$upstream_driver/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
    }

    # /employee -> تطبيق الموظفين (ملفات CSS/JS من nginx مباشرة)
    location = /employee {
        return 308 /employee/;
    }
    location /employee/ {
        root /var/www;
        try_files $uri $uri/ @employee_proxy;
    }
    location @employee_proxy {
        set $upstream_employee delivery-employee-web:3002;
        proxy_pass http://$upstream_employee/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
    }

    # الرئيسي -> التطبيق
    location / {
        set $upstream_app delivery-system:3000;
        proxy_pass http://$upstream_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
