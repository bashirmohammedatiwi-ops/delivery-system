# شركة ديما الحياة - شهادة ذاتية (البورت 8443)
# استخدم عندما البورت 80 محجوز — Let's Encrypt لا يعمل
# الوصول: https://demaalhayaadelivery.online:8443 و /employee و /driver

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location = /driver {
        return 308 /driver/;
    }
    location /driver/ {
        proxy_pass http://driver-web:3001/;
    }

    location = /employee {
        return 308 /employee/;
    }
    location /employee/ {
        proxy_pass http://employee-web:3002/;
    }

    location / {
        proxy_pass http://app:3000;
    }
}
