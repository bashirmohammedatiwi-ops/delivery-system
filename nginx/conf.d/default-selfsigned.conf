# شركة ديما الحياة - شهادة ذاتية (البورت 8443)
# استخدم عندما البورت 80 محجوز — Let's Encrypt لا يعمل
# الوصول: https://demaalhayaadelivery.online:8443 و /employee و /driver
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location = /driver {
        return 308 /driver/;
    }
    location /driver/ {
        set $upstream_driver driver-web:3001;
        proxy_pass http://$upstream_driver/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
    }

    location = /employee {
        return 308 /employee/;
    }
    location /employee/ {
        set $upstream_employee employee-web:3002;
        proxy_pass http://$upstream_employee/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
    }

    # سياسة الخصوصية
    location = /privacy {
        set $upstream_app app:3000;
        proxy_pass http://$upstream_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $upstream_app app:3000;
        proxy_pass http://$upstream_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
    }
}
