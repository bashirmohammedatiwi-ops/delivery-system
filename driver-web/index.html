<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق السائق - شركة ديما الحياة</title>
    <script>
      (function(){
        var p=location.pathname;
        var b=(p.indexOf('/driver')===0)?'/driver/':(p.indexOf('/employee')===0)?'/employee/':'/';
        document.write('<base href="'+b+'">');
      })();
    </script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div id="login-screen" class="screen active">
            <div class="login-bg"></div>
            <div class="login-content">
                <div class="login-logo-block">
                    <div class="login-logo-icon">🚚</div>
                    <h1 class="login-title">تطبيق السائق</h1>
                    <p class="login-subtitle">شركة ديما الحياة</p>
                </div>
                <div class="login-card">
                    <input type="text" id="loginUsername" placeholder="اسم المستخدم" autocomplete="username">
                    <input type="password" id="loginPassword" placeholder="كلمة المرور" autocomplete="current-password">
                    <div id="loginError" class="login-error" style="display:none"></div>
                    <button type="button" class="btn btn-primary btn-block" id="btnLogin">تسجيل الدخول</button>
                </div>
            </div>
        </div>
        <div id="main-screen" class="screen">
            <header class="driver-header">
                <h2 class="driver-header-title">تطبيق السائق</h2>
                <span class="driver-header-name" id="driverName">—</span>
            </header>
            <main class="driver-content" id="driverContent"></main>
            <nav class="bottom-nav">
                <button type="button" class="bottom-nav-item active" data-tab="orders" title="طلباتي">
                    <span class="bottom-nav-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1 0-2 .9-2 2v3.01c0 .72.43 1.34 1 1.61V20c0 1.1 1.1 2 2 2h14c.9 0 2-.9 2-2V8.61c.57-.27 1-.89 1-1.61V4c0-1.1-1-2-2-2zm-5 3.67V6H9v-.33L12 4l3 1.67zm-7 14v-9h14v9H8z"/></svg></span>
                    <span class="bottom-nav-label">طلباتي</span>
                </button>
                <button type="button" class="bottom-nav-item" data-tab="receive" title="استلام">
                    <span class="bottom-nav-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6v12h16V6H4zm2 2h12v8H6V8zm0 2v4h6v-4H6zm8 0v4h4v-4h-4z"/><path d="M2 4h4v2H2zM2 2h2v2H2z"/></svg></span>
                    <span class="bottom-nav-label">استلام</span>
                </button>
                <button type="button" class="bottom-nav-item" data-tab="pending" title="منتظرة">
                    <span class="bottom-nav-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8zm.5-13H11v6l5.2 3.2.8-1.3-4.5-2.7V7z"/></svg></span>
                    <span class="bottom-nav-label">منتظرة</span>
                </button>
                <button type="button" class="bottom-nav-item" data-tab="stats" title="إحصائيات">
                    <span class="bottom-nav-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 3v18h18V3H3zm16 16H5V5h14v14zM7 17h2v-7H7v7zm4 0h2V7h-2v10zm4 0h2v-4h-2v4z"/></svg></span>
                    <span class="bottom-nav-label">إحصائيات</span>
                </button>
                <button type="button" class="bottom-nav-item" data-tab="history" title="السجل">
                    <span class="bottom-nav-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg></span>
                    <span class="bottom-nav-label">السجل</span>
                </button>
                <button type="button" class="bottom-nav-item" data-tab="settings" title="إعدادات">
                    <span class="bottom-nav-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></span>
                    <span class="bottom-nav-label">إعدادات</span>
                </button>
            </nav>
        </div>
    </div>
    <script src="html5-qrcode.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
