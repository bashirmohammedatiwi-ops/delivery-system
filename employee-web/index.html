<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#7C3AED">
    <title>تطبيق الموظفين - ديما الحياة</title>
    <script>
      (function(){
        var p=location.pathname;
        var b=(p.indexOf('/employee')===0)?'/employee/':(p.indexOf('/driver')===0)?'/driver/':'/';
        var base=document.createElement('base');
        base.href=b;
        document.head.insertBefore(base,document.head.firstChild);
      })();
    </script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div id="login-screen" class="screen active">
            <div class="login-wrap">
                <div class="login-content">
                    <div class="login-brand">
                        <h1 class="login-title">تطبيق الموظفين</h1>
                        <p class="login-subtitle">نظام التوصيل — ديما الحياة</p>
                    </div>
                    <div class="login-card">
                        <div class="login-card-body">
                            <input type="text" id="loginUsername" placeholder="اسم المستخدم" autocomplete="username">
                            <input type="password" id="loginPassword" placeholder="كلمة المرور" autocomplete="current-password">
                            <div id="loginError" class="login-error" style="display:none"></div>
                            <button type="button" class="btn btn-primary btn-block btn-login" id="btnLogin">تسجيل الدخول</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="main-screen" class="screen">
            <header class="emp-header">
                <div class="emp-header-inner">
                    <h2 class="emp-header-title">الموظفين</h2>
                    <div class="emp-header-user">
                        <span class="emp-header-avatar" id="empAvatar">م</span>
                        <span class="emp-header-name" id="empName">—</span>
                    </div>
                </div>
            </header>
            <main class="emp-content" id="empContent"></main>
            <nav class="bottom-nav">
                <div class="bottom-nav-track">
                    <button type="button" class="bottom-nav-item active" data-tab="new-order" title="طلب جديد">
                        <span class="bottom-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
                        <span class="bottom-nav-label">طلب جديد</span>
                    </button>
                    <button type="button" class="bottom-nav-item" data-tab="receive" title="استلام">
                        <span class="bottom-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
                        <span class="bottom-nav-label">استلام</span>
                    </button>
                    <button type="button" class="bottom-nav-item" data-tab="orders" title="الطلبات">
                        <span class="bottom-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></span>
                        <span class="bottom-nav-label">الطلبات</span>
                    </button>
                    <button type="button" class="bottom-nav-item" data-tab="settings" title="إعدادات">
                        <span class="bottom-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
                        <span class="bottom-nav-label">إعدادات</span>
                    </button>
                </div>
            </nav>
        </div>
    </div>
    <script src="html5-qrcode.min.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
