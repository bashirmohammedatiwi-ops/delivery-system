# تشغيل على الدومين مع Let's Encrypt (https://demaalhayaadelivery.online)
#
# ⚠️ سيرفر فيه دومينات أخرى؟ أضف override-multisite.yml (انظر FIX-MULTI-DOMAIN.md):
#   docker compose -f docker-compose.yml -f docker-compose.override-domain.yml \
#     -f docker-compose.override-multisite.yml --profile https up -d --build
#
# سيرفر مخصص لدومين التوصيل فقط:
#   docker compose -f docker-compose.yml -f docker-compose.override-domain.yml --profile https up -d

services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
