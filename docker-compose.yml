# شركة ديما الحياة - نظام إدارة التوصيل
# تشغيل: docker-compose up -d
# تطبيق الموظفين متاح على البورت 3002
# عند تعارض أسماء: docker rm -f delivery-driver-web delivery-employee-web delivery-system ثم docker-compose up -d

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: alhayat-delivery:latest
    container_name: delivery-system
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - app-data:/app/data
      - ./fonts:/app/fonts
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  employee-web:
    image: alhayat-delivery:latest
    container_name: delivery-employee-web
    restart: unless-stopped
    command: ["node", "server-employee.js"]
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - EMPLOYEE_PORT=3002
      - MAIN_HOST=app
      - MAIN_PORT=3000
    depends_on:
      - app

  driver-web:
    image: alhayat-delivery:latest
    container_name: delivery-driver-web
    restart: unless-stopped
    command: ["node", "server-driver.js"]
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DRIVER_PORT=3001
      - MAIN_HOST=app
      - MAIN_PORT=3000
    depends_on:
      - app

  # Nginx - HTTPS (شغّله عند وجود دومين: docker-compose --profile https up -d)
  # أولاً شغّل: bash scripts/init-ssl.sh للحصول على شهادة Let's Encrypt
  # Certbot — الحصول على شهادة Let's Encrypt (مرة واحدة) — يستخدم البورت 80
  certbot-init:
    image: certbot/certbot
    volumes:
      - letsencrypt:/etc/letsencrypt:rw
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        certbot certonly --standalone -d $$DOMAIN --email "$$SSL_EMAIL" \
          --agree-tos --no-eff-email --non-interactive \
          && echo "تم الحصول على الشهادة بنجاح"
    environment:
      - DOMAIN=${DOMAIN}
      - SSL_EMAIL=${SSL_EMAIL:-noreply@example.com}
    profiles:
      - init-ssl

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: alhayat-delivery-nginx:latest
    container_name: delivery-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/certbot-webroot:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - app
      - employee-web
      - driver-web

volumes:
  app-data:
    driver: local
  letsencrypt:
    driver: local

networks:
  default:
    name: alhayat-delivery-net
