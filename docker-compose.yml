# شركة ديما الحياة - نظام إدارة التوصيل
# تشغيل: docker-compose up -d
# تطبيق الموظفين متاح على البورت 3002

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: alhayat-delivery:latest
    container_name: delivery-system
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - app-data:/app/data
      - ./fonts:/app/fonts
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  employee-web:
    image: alhayat-delivery:latest
    container_name: delivery-employee-web
    restart: unless-stopped
    command: ["node", "server-employee.js"]
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - EMPLOYEE_PORT=3002
      - MAIN_HOST=app
      - MAIN_PORT=3000
    depends_on:
      - app

  driver-web:
    image: alhayat-delivery:latest
    container_name: delivery-driver-web
    restart: unless-stopped
    command: ["node", "server-driver.js"]
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DRIVER_PORT=3001
      - MAIN_HOST=app
      - MAIN_PORT=3000
    depends_on:
      - app

  # Caddy - HTTPS (شغّله فقط عند وجود دومين: docker-compose --profile https up -d)
  caddy:
    image: caddy:2-alpine
    container_name: delivery-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - app
    profiles:
      - https

volumes:
  app-data:
    driver: local
  caddy-data:
    driver: local

networks:
  default:
    name: alhayat-network