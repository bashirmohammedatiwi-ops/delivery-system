# multisite + المنفذ 3000 مكشوف على IP السيرفر (مثلاً http://187.124.23.65:3000)
# docker compose -f docker-compose.yml -f docker-compose.override-multisite-public.yml up -d --build

services:
  app:
    ports: !override
      - "3000:3000"

  employee-web:
    ports: !override
      - "127.0.0.1:3002:3002"

  driver-web:
    ports: !override
      - "127.0.0.1:3001:3001"
