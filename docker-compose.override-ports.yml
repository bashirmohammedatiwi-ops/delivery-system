# استخدم عندما البورت 80 محجوز لتطبيق آخر
# شهادة ذاتية — المتصفح قد يعرض تحذيراً
# شغّل: docker-compose -f docker-compose.yml -f docker-compose.override-ports.yml --profile https up -d
# الوصول: https://demaalhayaadelivery.online:8443 و /employee و /driver

services:
  nginx:
    ports:
      - "8443:443"
    volumes:
      - nginx-certs:/etc/nginx/certs
    environment:
      - SELF_SIGNED=true

volumes:
  nginx-certs:
